<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4F46E5,#7C3AED);
            font-family:Arial,sans-serif;
            overflow:hidden;
        }

        .logo{
            text-align:center;
            color:white;
            animation:zoom 2s ease-in-out;
        }

        .logo h1{
            font-size:60px;
            margin-top:15px;
        }

        .logo p{
            font-size:22px;
            margin-top:10px;
            opacity:.9;
        }

        @keyframes zoom{
            0%{
                transform:scale(.3);
                opacity:0;
            }
            100%{
                transform:scale(1);
                opacity:1;
            }
        }
    </style>

    <script>
        setTimeout(function(){
            window.location.href="/home";
        },2000);
    </script>

</head>

<body>

<div class="logo">

    <div style="font-size:80px;">🤖</div>

    <h1>Smart Lender</h1>

    <p>AI Based Loan Approval Prediction System</p>

</div>

</body>
</html>
